<style>

<script>

  var ITEMS = {
    greenBath:   { name: "情緒安神淨化包（綠標）30入", price: "NT$399", slug: "calming-incense-shower",        pid: 584919, spec: 2008528, img: "5164_69d89abcc2f2c.jpg.webp" },

  var PRODUCTS = {
    green: { bath: x(ITEMS.greenBath, "睡前的泡浴儀式，把今天慢慢洗掉"), spray: x(ITEMS.greenSpray, "噴在房間與織品上，讓空間聞起來不一樣"), incense: x(ITEMS.greenPowder, "點一盤，讓空間慢慢靜下來") },

    gold:  { bath: x(ITEMS.goldSpray, "開工開市、月初理財的財位換頻儀式"), spray: x(ITEMS.goldSpray, "開工開市、簽約提案前，先幫工作空間換個頻"), incense: x(ITEMS.goldSpray, "搭配極光薰香碟放在財位，成為你的月初儀式") }
  };
  var PAIRING  = { green: ITEMS.greenSpray, blue: ITEMS.blueSpray, pink: ITEMS.pinkSpray, gold: ITEMS.dish };
  var PAIR_ALT = { green: ITEMS.greenBath,  blue: ITEMS.blueBath,  pink: ITEMS.pinkBath,  gold: ITEMS.dish };

  var TYPES = {
    green: { emoji: "🌙", color: "#6f8f6a", title: "睡前儀式型", desc: "你的思緒常常加班。比起多做什麼，你更需要一段幫自己「關機」的固定儀式。" },
    blue:  { emoji: "🍃", color: "#6d87a8", title: "環境感應型", desc: "你對環境的訊號特別敏銳，出門一趟像跑了馬拉松。你需要的是回家後把自己收回來的日常淨化習慣。" },
    pink:  { emoji: "🌸", color: "#c58a96", title: "花香氛圍型", desc: "你在意身邊的人與溫度。約會、聚會這些重要場合前，一段小小的儀式感能讓你用最喜歡的狀態出門。" },
    gold:  { emoji: "✨", color: "#bfa14a", title: "豐盛起手型", desc: "開工開市、月初理財、簽約提案——你喜歡把每個開始都好好對待。給工作空間一個換頻儀式，就是你的起手式。" }
  };

  var QUESTIONS = [
    { q: "最近的你，哪一句最有感？", opts: [
      { t: "🌙 腦子常常下不了班，睡前想東想西", line: "green" },
      { t: "🍃 人多的地方待久了，整個人像被抽乾", line: "blue" },
      { t: "🌸 想讓生活多一點人與人的溫度", line: "pink" },
      { t: "✨ 新的階段要開始了，想好好起頭", line: "gold" } ] },
    { q: "走進一個空間，你最先注意到什麼？", opts: [
      { t: "🛋 安不安靜、能不能讓我放鬆", line: "green" },
      { t: "👀 氣氛對不對勁，我很容易受環境影響", line: "blue" },
      { t: "💬 氣氛熱不熱絡、有沒有聊得來的人", line: "pink" },
      { t: "📈 這個地方有沒有機會、值不值得經營", line: "gold" } ] },
    { q: "送你一天完全屬於自己的假，你想怎麼過？", opts: [
      { t: "🛁 在家放空，把自己好好收回來", line: "green" },
      { t: "⛰ 遠離人群，找個安靜的地方充電", line: "blue" },
      { t: "☕ 約在乎的人見面，好好聊聊", line: "pink" },
      { t: "📒 整理計畫，把想做的事往前推一格", line: "gold" } ] },
    { q: "哪一種小儀式最像你會做的事？", opts: [
      { t: "🛁 睡前泡個澡，把今天慢慢洗掉", fmt: "bath" },
      { t: "💨 幫房間、車上或包包織品換個氣味", fmt: "spray" },
      { t: "🕯 點一盤香，讓空間慢慢靜下來", fmt: "incense" } ] },
    { q: "忙完一整天回到家，第一件想做的事是？", opts: [
      { t: "🚿 先洗澡，其他等等再說", fmt: "bath" },
      { t: "🛋 換上家居服，窩進自己的角落", fmt: "incense" },
      { t: "📱 先癱著滑手機，越不費力越好", fmt: "spray" } ] }
  ];

  function x(item, why) { var o = {}; for (var k in item) o[k] = item[k]; o.why = why; return o; }

  var root = document.getElementById("arq-app");
  var step = -1, lineScore, fmtScore, addedCount = 0;
  var current = { main: null, pair: null, line: null };

  function itemUrl(p, tag) { return CONFIG.SHOP + "/item/" + p.slug + "?" + CONFIG.UTM + "&utm_content=" + tag; }
  function esc(s) { return String(s).replace(/"/g, "&quot;"); }

  function shell(inner, showDots) {
    var dots = "";
    for (var i = 0; i < QUESTIONS.length; i++) dots += '<div class="arq-dot' + (i <= step ? " on" : "") + '"></div>';
    return '<div class="arq-head"><h2>1 分鐘找到你的日常儀式</h2><p>5 個小問題，找到最適合你的第一件淨化儀式小物</p></div>' +
      '<div class="arq-dots" style="visibility:' + (showDots ? "visible" : "hidden") + '">' + dots + "</div>" + inner +
      '<p class="arq-foot">這個小測驗幫你認識自己的偏好，不是醫療或命理建議。<br>若使用產品過程有不適，請先暫停並視情況尋求專業協助。</p>';
  }

  function renderStart() {
    step = -1; addedCount = 0;
    lineScore = { green: 0, blue: 0, pink: 0, gold: 0 };
    fmtScore = { bath: 0, spray: 0, incense: 0 };
    root.innerHTML = shell(
      '<div class="arq-panel arq-start">' +
      '<div style="font-size:40px">🔮</div>' +
      '<h3 style="font-size:19px;margin:8px 0 6px;font-weight:700">不知道第一件該選什麼？</h3>' +
      '<p style="font-size:14.5px;color:#8d8574">每個人適合的日常儀式都不一樣。<br>回答 5 個生活小問題，我們幫你找到起點，<br>還有一份見面禮等你 🎁</p>' +
      '<button class="arq-big" data-act="start">開始測驗</button></div>', false);
  }

  function renderQ() {
    var q = QUESTIONS[step], html = '<div class="arq-panel"><div class="arq-qtitle">' + q.q + "</div>";
    for (var i = 0; i < q.opts.length; i++) html += '<button class="arq-opt" data-act="pick" data-i="' + i + '">' + q.opts[i].t + "</button>";
    root.innerHTML = shell(html + "</div>", true);
  }

  function next() {
    step++;
    if (step >= QUESTIONS.length) return renderResult();
    renderQ();
  }

  function topKey(obj, order) {
    var best = order[0];
    for (var i = 1; i < order.length; i++) if (obj[order[i]] > obj[best]) best = order[i];
    return best;
  }

  function addBtn(key, extraCls) {
    return '<button class="arq-add' + (extraCls || "") + '" data-act="add" data-key="' + key + '">＋ 加入購物車</button>';
  }

  function renderResult() {
    var line = topKey(lineScore, ["blue", "green", "pink", "gold"]);
    var fmt = topKey(fmtScore, ["bath", "spray", "incense"]);
    var t = TYPES[line];
    current.main = PRODUCTS[line][fmt];
    current.pair = (fmt === "spray") ? PAIR_ALT[line] : PAIRING[line];
    current.line = line;
    root.innerHTML = shell(
      '<div class="arq-panel arq-result">' +
      '<span class="arq-tag" style="background:' + t.color + '">你的儀式類型</span>' +
      "<h3>" + t.emoji + " " + t.title + "</h3>" +

      '<div class="arq-pair"><img src="' + IMG + current.pair.img + '" alt="' + esc(current.pair.name) + '"><div>' +
      '<div class="pl">很多人一起帶的搭檔</div>' +
      '<div class="pn"><a href="' + itemUrl(current.pair, line + "-pair") + '" target="_top">' + current.pair.name + "</a></div>" +
      '<div class="pp">' + current.pair.price + "</div></div>" + addBtn("pair") + "</div>" +
      '<div class="arq-status" data-role="status"></div>' +
      '<div class="arq-coupon"><div class="cl">🎁 測驗完成見面禮｜' + CONFIG.DISCOUNT_TEXT + "</div>" +
      '<div class="cc">' + CONFIG.DISCOUNT_CODE + "</div>" +
      '<button data-act="copy">複製折扣碼</button><div class="ch">結帳時輸入即可折抵</div></div>' +
      '<a class="arq-big" href="' + (SAME_ORIGIN ? "/order_form" : itemUrl(current.main, line + "-checkout")) + '" target="_top">🛒 前往結帳，輸入折扣碼</a>' +
      '<a class="arq-ghost" href="' + CONFIG.SHOP + "/category/%E9%A6%96%E6%AC%A1%E4%BD%BF%E7%94%A8%E6%8E%A8%E8%96%A6?" + CONFIG.UTM + '&utm_content=starter" target="_top">看看首購推薦套組</a>' +
      '<a class="arq-ghost" href="' + CONFIG.LINE_URL + '" target="_blank" rel="noopener">加 LINE 好友，會員購物金再領一筆</a>' +
      '<button class="arq-ghost" data-act="restart">↻ 重新測一次</button>' +
      "</div>", true);
  }

  function addToCart(key, btn) {
    var item = current[key];
    if (!item) return;
    if (!SAME_ORIGIN) { // 預覽模式（GitHub Pages / 本機）：退回商品頁
      window.top.location.href = itemUrl(item, current.line + "-" + key);
      return;
    }
    btn.disabled = true; btn.textContent = "加入中…";
    var token = (document.querySelector('meta[name="csrf-token"]') || {}).content || "";
    var webinfo = btoa(encodeURIComponent(JSON.stringify({ id: null, name: null, phone: null, email: null, connect_email: null })));
    fetch("/cart", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
        "X-CSRF-TOKEN": token, "WEB-INFO": webinfo, "X-Requested-With": "XMLHttpRequest"
      },
      body: "product_id=" + item.pid + "&product_spec_id=" + (item.spec || "") +
            "&booking_setting_id=&product_periodic_setting_id=&quantity=1&input_min=1&input_max=1"
    }).then(function (r) { return r.json(); }).then(function (j) {
      if (j && j.result === "success") {
        addedCount++;
        btn.textContent = "✓ 已加入";
        btn.classList.add("ok");
        var s = root.querySelector('[data-role="status"]');
        s.textContent = "✓ 已加入購物車（" + addedCount + " 件）— 記得複製下方折扣碼再結帳";
        s.classList.add("show");
      } else { throw new Error("add failed"); }
    }).catch(function () { // 任何失敗都退回商品頁，讓客人用官網原生按鈕
      window.top.location.href = itemUrl(item, current.line + "-" + key);
    });
  }

  function copyCode(btn) {
    var code = CONFIG.DISCOUNT_CODE;
    var done = function () { btn.textContent = "已複製 ✓"; setTimeout(function () { btn.textContent = "複製折扣碼"; }, 2000); };
    if (navigator.clipboard) { navigator.clipboard.writeText(code).then(done); }
    else {
      var ta = document.createElement("textarea");
      ta.value = code; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove(); done();
    }
  }

  root.addEventListener("click", function (e) {
    var el = e.target.closest("[data-act]");
    if (!el) return;
    var act = el.getAttribute("data-act");
    if (act === "start") next();
    else if (act === "pick") {
      var o = QUESTIONS[step].opts[+el.getAttribute("data-i")];
      if (o.line) lineScore[o.line]++;
      if (o.fmt) fmtScore[o.fmt]++;
      next();
    }
    else if (act === "add") addToCart(el.getAttribute("data-key"), el);
    else if (act === "copy") copyCode(el);
    else if (act === "restart") renderStart();
  });

  renderStart();
})();
</script>
