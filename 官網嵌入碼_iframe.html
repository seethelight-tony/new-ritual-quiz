<!-- ▼▼▼ 極光盾新手測驗：BVSHOP 嵌入碼（iframe 版）｜整段複製貼進 HTML 元件 ▼▼▼ -->
<iframe
  id="arq-frame"
  src="https://seethelight-tony.github.io/new-ritual-quiz/"
  title="極光盾新手選品測驗"
  loading="lazy"
  scrolling="no"
  allow="clipboard-write"
  style="width:100%;max-width:640px;height:800px;border:0;display:block;margin:0 auto;border-radius:16px;overflow:hidden;"
></iframe>
<script>
(function () {
  var f = document.getElementById("arq-frame");
  window.addEventListener("message", function (e) {
    if (!e.data || typeof e.data.arqHeight !== "number") return;
    if (e.origin.indexOf("seethelight-tony.github.io") === -1) return;
    var h = e.data.arqHeight;
    if (h > 200 && h < 4000) f.style.height = h + "px";
  });
})();
</script>
<!-- ▲▲▲ 嵌入碼結束 ▲▲▲ -->
